# Render.com Blueprint — Backend only (frontend goes to Vercel)
services:
  - type: web
    name: stockbuddy-api
    runtime: python
    region: oregon
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
